{% extends 'pharmacy/base.html' %}
{% block title %}{{ action }} Medicine{% endblock %}
{% block page_title %}💊 {{ action }} Medicine{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-lg-8">
<div class="card">
    <div class="card-header">
        <i class="bi bi-capsule me-2"></i>{{ action }} Medicine
    </div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label">Medicine Name *</label>
                    <input type="text" name="name" class="form-control" required
                        value="{{ medicine.name|default:'' }}" placeholder="e.g. AMCEF 1GM"
                        style="text-transform:uppercase">
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-select" required>
                        {% for val, label in categories %}
                        <option value="{{ val }}" {% if medicine.category == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Batch Number</label>
                    <input type="text" name="batch_no" class="form-control"
                        value="{{ medicine.batch_no|default:'' }}" placeholder="e.g. B240141B">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Pack Size</label>
                    <input type="text" name="pack" class="form-control"
                        value="{{ medicine.pack|default:'1*10' }}" placeholder="1*10">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">MRP (₹) *</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" name="mrp" class="form-control" step="0.01" min="0" required
                            value="{{ medicine.mrp|default:'' }}" placeholder="0.00">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">GST %</label>
                    <select name="gst_percent" class="form-select">
                        <option value="5" {% if medicine.gst_percent == 5 %}selected{% endif %}>5% (INJ/Surgical)</option>
                        <option value="12" {% if medicine.gst_percent == 12 or not medicine %}selected{% endif %}>12% (Tab/Cap/Syrup)</option>
                        <option value="18" {% if medicine.gst_percent == 18 %}selected{% endif %}>18% (Shampoo/Soap)</option>
                        <option value="0" {% if medicine.gst_percent == 0 %}selected{% endif %}>0% (Exempt)</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Current Stock (Units)</label>
                    <input type="number" name="stock" class="form-control" step="0.01" min="0"
                        value="{{ medicine.stock|default:'0' }}">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Manufacturing Date</label>
                    <input type="month" name="mfd" class="form-control"
                        value="{% if medicine.mfd %}{{ medicine.mfd|date:'Y-m' }}{% endif %}">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Expiry Date</label>
                    <input type="month" name="expiry" class="form-control"
                        value="{% if medicine.expiry %}{{ medicine.expiry|date:'Y-m' }}{% endif %}">
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i> {{ action }} Medicine
                </button>
                <a href="{% url 'inventory' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.querySelector('[name="name"]').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
});
// Auto-set GST based on category
document.querySelector('[name="category"]').addEventListener('change', function() {
    const cat = this.value;
    const gstSel = document.querySelector('[name="gst_percent"]');
    if (['INJ','SURGICAL','FLUID','INFUSION'].includes(cat)) gstSel.value = '5';
    else if (['SHAMPOO','SOAP'].includes(cat)) gstSel.value = '18';
    else gstSel.value = '12';
});
</script>
{% endblock %}
